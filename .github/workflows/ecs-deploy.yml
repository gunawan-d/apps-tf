name: CI/CD to ECS

on:
  push:
    branches: [ main, devsecops-task-definition ]

jobs:
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    environment: prod
    # 1. Pastikan bagian outputs ini tidak menjorok terlalu dalam
    outputs:
      image: ${{ steps.build_push_step.outputs.image }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build_push_step
      run: |
        REGISTRY=${{ steps.login-ecr.outputs.registry }}
        REPO="apps-tf"
        TAG=${{ github.sha }}
        FULL_IMAGE="$REGISTRY/$REPO:$TAG"
        
        docker build -t $FULL_IMAGE .
        docker push $FULL_IMAGE
        
        # 2. Menggunakan format terbaru untuk menulis output
        echo "image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    environment: prod
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 3. Step tambahan untuk memastikan variabel masuk
    - name: Verify Image Variable
      run: |
        echo "Image yang diterima dari build job: ${{ needs.build.outputs.image }}"

    - name: Render Amazon ECS task definition
      id: render-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: apps-tf
        image: ${{ needs.build.outputs.image }}

    - name: Deploy to Amazon ECS service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-task-def.outputs.task-definition }}
        service: app-service
        cluster: app-gunawan-cluster
        wait-for-service-stability: true