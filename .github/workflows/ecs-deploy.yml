name: CI/CD to ECS

on:
  push:
    branches: [ main, devsecops-task-definition ]

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: prod

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 🔐 AWS Auth
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 🐳 Login ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 🏗️ Build & Push Image
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: apps-tf
        IMAGE_TAG: ${{ github.sha }}
      run: |
        set -e

        FULL_IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

        echo "Building image: $FULL_IMAGE"
        docker build -t $FULL_IMAGE .

        echo "Pushing image..."
        docker push $FULL_IMAGE

        echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT

    # 🔍 Debug image (WAJIB buat validasi)
    - name: Debug image output
      run: echo "IMAGE => ${{ steps.build-image.outputs.image }}"

    # 🧠 Render Task Definition
    - name: Render Amazon ECS task definition
      id: render-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: apps-tf
        image: ${{ steps.build-image.outputs.image }}

    # 🔍 Debug hasil render (INI YANG PALING PENTING)
    - name: Debug rendered task definition
      run: |
        echo "===== RENDERED TASK DEF ====="
        cat ${{ steps.render-task-def.outputs.task-definition }}

    # 🚀 Deploy ke ECS
    - name: Deploy to Amazon ECS service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-task-def.outputs.task-definition }}
        service: app-service
        cluster: app-gunawan-cluster
        wait-for-service-stability: true