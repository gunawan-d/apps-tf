name: CI/CD to ECS

on:
  push:
    branches: [ main, devsecops-task-definition ]

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: prod

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: apps-tf
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Membentuk URI image
        FULL_IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        
        # Build dan Push
        docker build -t $FULL_IMAGE .
        docker push $FULL_IMAGE
        
        # Simpan output untuk digunakan di step berikutnya (masih di job yang sama)
        echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT

    - name: Render Amazon ECS task definition
      id: render-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: apps-tf
        # Langsung ambil dari step 'build-image' di atas
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy to Amazon ECS service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-task-def.outputs.task-definition }}
        service: app-service
        cluster: app-gunawan-cluster
        wait-for-service-stability: true