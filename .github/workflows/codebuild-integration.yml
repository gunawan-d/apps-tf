name: CodeBuild Integration

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  AWS_REGION: ap-southeast-3
  CODEBUILD_PROJECT_NAME: apps-tf-codebuild

jobs:
  trigger-codebuild:
    name: Trigger CodeBuild
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_CODEBUILD_ROLE_ARN }}
          role-session-name: GitHubActionsCodeBuild

      - name: Trigger CodeBuild build
        uses: aws-actions/aws-codebuild@v1
        with:
          project-name: ${{ env.CODEBUILD_PROJECT_NAME }}
          # Optional: Pass build arguments
          # build-args: |
          #   -e BUILD_NUMBER=${{ github.run_number }}
          #   -e GIT_COMMIT=${{ github.sha }}
        continue-on-error: false

      # Optional: If you want to wait for build completion
      # - name: Wait for CodeBuild completion
      #   uses: aws-actions/aws-codebuild@v1
      #   with:
      #     project-name: ${{ env.CODEBUILD_PROJECT_NAME }}
      #     wait-for-build: true
      #     build-id: ${{ steps.trigger-codebuild.outputs.build-id }}
