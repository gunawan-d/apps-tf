version: 0.2

env:
  variables:
    AWS_REGION: ap-southeast-3
    IMAGE_REPO_NAME: apps-tf
    IMAGE_TAG: latest
    AWS_ACCOUNT_ID: 148963274465

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - echo "Image URI will be $REPOSITORY_URI:$IMAGE_TAG"

  build:
    commands:
      - echo "Building Docker image from Dockerfile..."
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .
      - docker tag $REPOSITORY_URI:$IMAGE_TAG $REPOSITORY_URI:latest
      - echo "Docker image built successfully at $(date)"

  post_build:
    commands:
      - echo "Pushing Docker image to ECR..."
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - printf '[{"name":"'$IMAGE_REPO_NAME'","imageUri":"'$REPOSITORY_URI':'$IMAGE_TAG'"}]' > imagedefinitions.json
      - echo "Docker image pushed successfully"

artifacts:
  files:
    - imagedefinitions.json
  name: BuildArtifact
