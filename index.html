<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5rem;
        }
        .message {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .health-status {
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .healthy {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        .unhealthy {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        .loading {
            color: #6c757d;
            font-style: italic;
        }
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9rem;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Hello World!</h1>
        <p class="message" id="message">Loading backend message...</p>
        <div>
            <span class="loading" id="health">Checking health...</span>
        </div>
        <button class="btn" onclick="checkHealth()">Check Health Again</button>
        <p class="footer">Backend: Go + Gin | Frontend: Vanilla JS</p>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';

        // Fetch Hello World message
        async function fetchMessage() {
            try {
                const response = await fetch(`${API_BASE}/`);
                const data = await response.json();
                document.getElementById('message').innerHTML =
                    `<strong>Message:</strong> ${data.message}<br><strong>Author:</strong> ${data.author}`;
            } catch (error) {
                document.getElementById('message').innerHTML =
                    '❌ Unable to connect to backend. Make sure Go server is running on port 8080.';
            }
        }

        // Fetch health status
        async function checkHealth() {
            const healthEl = document.getElementById('health');
            healthEl.className = 'loading';
            healthEl.textContent = 'Checking...';

            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();

                if (data.status === 'healthy') {
                    healthEl.className = 'health-status healthy';
                    healthEl.textContent = `✅ Healthy (Last check: ${new Date(data.timestamp * 1000).toLocaleTimeString()})`;
                } else {
                    healthEl.className = 'health-status unhealthy';
                    healthEl.textContent = '❌ Unhealthy';
                }
            } catch (error) {
                healthEl.className = 'health-status unhealthy';
                healthEl.textContent = '❌ Backend unreachable';
            }
        }

        // Initialize
        fetchMessage();
        checkHealth();

        // Auto-refresh health every 5 seconds
        setInterval(checkHealth, 5000);
    </script>
</body>
</html>
